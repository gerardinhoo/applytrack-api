name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall -q app tests alembic

      - name: Validate Grafana dashboard JSON
        run: python -m json.tool monitoring/grafana/dashboards/applytrack-api.json > /dev/null

      - name: Validate database migrations
        env:
          DATABASE_URL: sqlite:////tmp/applytrack-migrations.db
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run tests
        run: pytest -q
