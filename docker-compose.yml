services:
  api:
    build: .
    container_name: applytrack-api
    ports:
      - "8000:8000"
    env_file:
      - .env

  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest

    container_name: grafana

    ports:
      - "3000:3000"
      
    depends_on:
      - prometheus